<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ziklo Admin — Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --green:        #00C87A;
      --green-dim:    rgba(0,200,122,.1);
      --green-border: rgba(0,200,122,.25);
      --black:        #0A0A0F;
      --surface:      #111118;
      --card:         #16161F;
      --border:       rgba(255,255,255,.07);
      --border-s:     rgba(255,255,255,.13);
      --white:        #F8FAFC;
      --muted:        #4B5563;
      --muted2:       #6B7280;
      --danger:       #EF4444;
      --danger-dim:   rgba(239,68,68,.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      position: relative;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow verde detrás del card */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(0,200,122,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    /* Logo / Brand */
    .brand {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: var(--green-dim);
      border: 1px solid var(--green-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg {
      width: 22px;
      height: 22px;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.5px;
      color: var(--white);
    }

    .brand-name span {
      color: var(--green);
    }

    .brand-sub {
      font-size: 13px;
      color: var(--muted2);
      font-weight: 400;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border-s);
      border-radius: 16px;
      padding: 32px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--muted2);
      margin-bottom: 28px;
    }

    /* Form */
    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-s);
      border-radius: 10px;
      padding: 12px 14px 12px 40px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    .field input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,200,122,.12);
    }

    .field input::placeholder {
      color: var(--muted);
    }

    /* Toggle password */
    .toggle-pass {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
    }

    .toggle-pass svg { width: 16px; height: 16px; }

    /* Error */
    .error-msg {
      display: none;
      background: var(--danger-dim);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--danger);
      margin-bottom: 16px;
      align-items: center;
      gap: 8px;
    }
    .error-msg.show { display: flex; }
    .error-msg svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Submit */
    .btn-login {
      width: 100%;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-login:hover { opacity: .88; }
    .btn-login:active { transform: scale(.98); }

    .btn-login.loading {
      opacity: .6;
      pointer-events: none;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
    }

    .login-footer a {
      color: var(--muted2);
      text-decoration: none;
    }

    .login-footer a:hover { color: var(--white); }
  </style>
</head>
<body>

<div class="login-wrap">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-icon">
        <!-- Ziklo Z logo -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 6h14L7 18h12" stroke="#00C87A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="brand-name">Ziklo<span>.</span></span>
    </div>
    <div class="brand-sub">Panel de administración</div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-title">Bienvenido</div>
    <div class="card-sub">Ingresá tus credenciales para continuar</div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorText">Credenciales incorrectas</span>
    </div>

    <form id="loginForm">
      <!-- Usuario -->
      <div class="field">
        <label>Usuario</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="admin"
            autocomplete="username"
            required
          />
        </div>
      </div>

      <!-- Contraseña -->
      <div class="field">
        <label>Contraseña</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-pass" id="togglePass" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eyeIcon">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-login" id="btnLogin">
        <div class="spinner"></div>
        <span class="btn-text">Ingresar al panel</span>
      </button>
    </form>
  </div>

  <div class="login-footer">
    Ziklo &copy; 2025 &nbsp;·&nbsp; <a href="mailto:hola@ziklo.app">Soporte</a>
  </div>

</div>

<script>
  // Toggle mostrar/ocultar contraseña
  const togglePass = document.getElementById('togglePass');
  const passInput  = document.getElementById('password');
  const eyeIcon    = document.getElementById('eyeIcon');

  togglePass.addEventListener('click', () => {
    const isPass = passInput.type === 'password';
    passInput.type = isPass ? 'text' : 'password';
    eyeIcon.innerHTML = isPass
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  // Submit form
  const form    = document.getElementById('loginForm');
  const btnLogin = document.getElementById('btnLogin');
  const errorMsg = document.getElementById('errorMsg');
  const errorText = document.getElementById('errorText');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.classList.remove('show');
    btnLogin.classList.add('loading');

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/admin/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      if (res.ok) {
        // Login exitoso → redirigir al panel
        window.location.href = '/admin/';
      } else {
        const data = await res.json().catch(() => ({}));
        errorText.textContent = data.error || 'Credenciales incorrectas';
        errorMsg.classList.add('show');
        btnLogin.classList.remove('loading');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    } catch (err) {
      errorText.textContent = 'Error de conexión. Intentá de nuevo.';
      errorMsg.classList.add('show');
      btnLogin.classList.remove('loading');
    }
  });

  // Enter submit
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && document.activeElement.tagName !== 'BUTTON') {
      form.dispatchEvent(new Event('submit'));
    }
  });
</script>

</body>
</html>
