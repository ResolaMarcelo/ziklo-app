<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ziklo — Ingresar</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
      --green:        #00C87A;
      --green-dim:    rgba(0,200,122,.12);
      --green-border: rgba(0,200,122,.3);
      --black:        #0A0A0F;
      --surface:      #111118;
      --card:         #16161F;
      --border:       rgba(255,255,255,.07);
      --border-s:     rgba(255,255,255,.11);
      --white:        #F8FAFC;
      --muted:        #4B5563;
      --muted2:       #6B7280;
      --danger:       #EF4444;
      --danger-dim:   rgba(239,68,68,.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      top: 38%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(0,200,122,.06) 0%, transparent 65%);
      pointer-events: none;
    }

    .wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      padding: 24px;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border-s);
      border-radius: 20px;
      padding: 36px 32px 32px;
      text-align: center;
    }

    /* Brand icon */
    .brand-icon {
      width: 52px; height: 52px;
      background: var(--green-dim);
      border: 1px solid var(--green-border);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    /* Title */
    .card-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.3px;
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 13px;
      color: var(--muted2);
      line-height: 1.5;
      margin-bottom: 28px;
    }

    /* Error */
    .error-msg {
      display: none;
      background: var(--danger-dim);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--danger);
      margin-bottom: 16px;
      text-align: left;
      align-items: center;
      gap: 8px;
    }
    .error-msg.show { display: flex; }
    .error-msg svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* Google button */
    .btn-google {
      width: 100%;
      background: #fff;
      border: 1px solid rgba(0,0,0,.1);
      border-radius: 10px;
      padding: 11px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #1f1f1f;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: background .15s, box-shadow .15s;
      margin-bottom: 20px;
      text-decoration: none;
    }
    .btn-google:hover { background: #f5f5f5; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
    .btn-google:active { background: #ececec; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      color: var(--muted);
      font-size: 11px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-s);
    }

    /* Email field */
    .field {
      text-align: left;
      margin-bottom: 12px;
    }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-s);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,200,122,.1);
    }
    .field input::placeholder { color: var(--muted); }

    /* Password wrap */
    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 40px; }
    .toggle-pass {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; padding: 0;
    }
    .toggle-pass svg { width: 15px; height: 15px; }

    /* Password field — oculto inicialmente */
    #passField { display: none; }

    /* Submit button */
    .btn-submit {
      width: 100%;
      background: var(--green);
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-top: 4px;
      transition: opacity .15s, transform .1s;
    }
    .btn-submit:hover  { opacity: .88; }
    .btn-submit:active { transform: scale(.98); }
    .btn-submit.loading { opacity: .6; pointer-events: none; }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-text { display: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Arrow icon */
    .btn-arrow { width: 14px; height: 14px; }

    /* Footer */
    .login-footer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 16px;
    }
    .login-footer a { color: var(--muted2); text-decoration: none; }
    .login-footer a:hover { color: var(--white); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">

    <!-- Brand icon -->
    <div class="brand-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <path d="M5 6h14L7 18h12" stroke="#00C87A" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="card-title">Iniciá sesión en Ziklo</div>
    <div class="card-sub">Bienvenido de nuevo. Por favor, ingresá para continuar.</div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorText">Error al iniciar sesión</span>
    </div>

    <!-- Google -->
    <a href="/auth/google" id="btnGoogle" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.83z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.83C6.71 7.31 9.14 5.38 12 5.38z" fill="#EA4335"/>
      </svg>
      Continuar con Google
    </a>

    <!-- Divider -->
    <div class="divider">o</div>

    <!-- Formulario email / contraseña -->
    <form id="loginForm" onsubmit="handleSubmit(event)">
      <div class="field" id="emailField">
        <label>Correo electrónico</label>
        <input type="email" id="emailInput" placeholder="Ingresá tu dirección de correo electrónico" autocomplete="email" />
      </div>

      <div class="field" id="passField">
        <label>Contraseña</label>
        <div class="pass-wrap">
          <input type="password" id="passInput" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="toggle-pass" id="togglePass" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eyeIcon">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="btnSubmit">
        <div class="spinner"></div>
        <span class="btn-text" id="btnLabel">Continuar</span>
        <svg class="btn-arrow" id="btnArrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </button>
    </form>

  </div>

  <div class="login-footer">
    Ziklo &copy; 2026 &nbsp;·&nbsp;
    <a href="mailto:hola@ziklo.app">Soporte</a> &nbsp;·&nbsp;
    <a href="/terms.html">Términos</a> &nbsp;·&nbsp;
    <a href="/privacy.html">Privacidad</a>
  </div>
</div>

<script>
  // Estado: 'email' → pide email primero; 'password' → pide contraseña
  let step = 'email';
  let pendingEmail = '';

  function showError(msg) {
    document.getElementById('errorText').textContent = msg;
    document.getElementById('errorMsg').classList.add('show');
  }
  function hideError() {
    document.getElementById('errorMsg').classList.remove('show');
  }

  async function handleSubmit(e) {
    e.preventDefault();
    hideError();

    if (step === 'email') {
      const email = document.getElementById('emailInput').value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('Ingresá un correo electrónico válido.');
        return;
      }
      pendingEmail = email;
      // Mostrar campo contraseña
      document.getElementById('passField').style.display = 'block';
      document.getElementById('emailInput').disabled = true;
      document.getElementById('btnLabel').textContent = 'Ingresar';
      document.getElementById('btnArrow').style.display = 'none';
      step = 'password';
      document.getElementById('passInput').focus();
      return;
    }

    // step === 'password'
    const password = document.getElementById('passInput').value;
    if (!password) {
      showError('Ingresá tu contraseña.');
      return;
    }

    const btn = document.getElementById('btnSubmit');
    btn.classList.add('loading');

    try {
      const res = await fetch('/auth/user/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: pendingEmail, password }),
      });

      if (res.ok) {
        window.location.href = '/admin/';
        return;
      }

      const data = await res.json().catch(() => ({}));
      showError(data.error || 'Credenciales incorrectas');
      btn.classList.remove('loading');
      document.getElementById('passInput').value = '';
      document.getElementById('passInput').focus();
    } catch (_) {
      showError('Error de conexión. Intentá de nuevo.');
      btn.classList.remove('loading');
    }
  }

  // Toggle contraseña visible
  document.getElementById('togglePass').addEventListener('click', () => {
    const input = document.getElementById('passInput');
    const icon  = document.getElementById('eyeIcon');
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  // Google loading state
  document.getElementById('btnGoogle').addEventListener('click', function() {
    this.textContent = '';
    this.innerHTML = '<div style="width:16px;height:16px;border:2px solid rgba(0,0,0,.15);border-top-color:#555;border-radius:50%;animation:spin .6s linear infinite"></div>';
  });

  // Si ya hay sesión → redirigir
  fetch('/admin/api/login-status')
    .then(r => r.json())
    .then(d => { if (d.loggedIn) window.location.href = '/admin/'; })
    .catch(() => {});

  // Errores de URL (Google OAuth)
  const params = new URLSearchParams(window.location.search);
  const errorParam = params.get('error');
  if (errorParam) {
    const msgs = {
      google_denied:   'Cancelaste el inicio de sesión con Google.',
      google_token:    'Error al obtener acceso con Google. Intentá de nuevo.',
      google_no_email: 'No se pudo obtener el email de tu cuenta Google.',
      google_error:    'Error inesperado con Google. Intentá de nuevo.',
    };
    showError(msgs[errorParam] || 'Ocurrió un error. Intentá de nuevo.');
  }
</script>
</body>
</html>
