<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ziklo — Nueva contraseña</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    :root {
      --green: #00C87A; --green-dim: rgba(0,200,122,.12); --green-border: rgba(0,200,122,.3);
      --black: #0A0A0F; --surface: #111118; --card: #16161F;
      --border-s: rgba(255,255,255,.10); --white: #F8FAFC;
      --muted: #4B5563; --muted2: #6B7280;
      --danger: #EF4444; --danger-dim: rgba(239,68,68,.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif; background: var(--black); color: var(--white);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .wrap { width: 100%; max-width: 400px; padding: 24px; }
    .logo { display: flex; align-items: center; gap: 9px; margin-bottom: 32px; justify-content: center; }
    .logo-icon { width: 34px; height: 34px; background: var(--green-dim); border: 1px solid var(--green-border); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .logo-name { font-size: 18px; font-weight: 800; letter-spacing: -.3px; }
    .logo-name span { color: var(--green); }
    .card { background: var(--card); border: 1px solid var(--border-s); border-radius: 16px; padding: 32px; }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .sub { font-size: 13px; color: var(--muted2); margin-bottom: 24px; line-height: 1.5; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 7px; }
    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 40px; }
    .field input {
      width: 100%; background: var(--surface); border: 1px solid var(--border-s);
      border-radius: 9px; padding: 11px 14px; color: var(--white);
      font-family: 'Inter', sans-serif; font-size: 14px; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,200,122,.10); }
    .field input::placeholder { color: var(--muted); }
    .toggle-pass { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; display: flex; align-items: center; padding: 0; }
    .toggle-pass svg { width: 15px; height: 15px; }
    .btn { width: 100%; background: var(--green); border: none; border-radius: 9px; padding: 12px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: opacity .15s; margin-top: 4px; }
    .btn:hover { opacity: .88; }
    .btn.loading { opacity: .6; pointer-events: none; }
    .btn.loading .spinner { display: block; } .btn.loading .btn-text { display: none; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,.2); border-top-color: #000; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { display: none; border-radius: 9px; padding: 10px 13px; font-size: 13px; margin-bottom: 16px; align-items: center; gap: 8px; }
    .msg.show { display: flex; }
    .msg.error { background: var(--danger-dim); border: 1px solid rgba(239,68,68,.2); color: var(--danger); }
    .msg.success { background: rgba(0,200,122,.08); border: 1px solid rgba(0,200,122,.2); color: var(--green); }
    .msg svg { width: 15px; height: 15px; flex-shrink: 0; }
    .back { display: block; text-align: center; font-size: 13px; color: var(--muted2); text-decoration: none; margin-top: 16px; }
    .back:hover { color: var(--white); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
        <path d="M5 6h14L7 18h12" stroke="#00C87A" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="logo-name">Ziklo<span>.</span></span>
  </div>

  <div class="card">
    <h1>Nueva contraseña</h1>
    <p class="sub">Elegí una contraseña segura para tu cuenta Ziklo.</p>

    <div class="msg error" id="errorMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorText">Error</span>
    </div>
    <div class="msg success" id="successMsg" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span>Contraseña actualizada. Redirigiendo...</span>
    </div>

    <form id="resetForm" onsubmit="handleReset(event)">
      <div class="field">
        <label>Nueva contraseña</label>
        <div class="pass-wrap">
          <input type="password" id="pass1" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />
          <button type="button" class="toggle-pass" onclick="toggleVis('pass1', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label>Repetir contraseña</label>
        <div class="pass-wrap">
          <input type="password" id="pass2" placeholder="Repetí la contraseña" autocomplete="new-password" />
          <button type="button" class="toggle-pass" onclick="toggleVis('pass2', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn" id="btnReset">
        <div class="spinner"></div>
        <span class="btn-text">Guardar contraseña</span>
      </button>
    </form>
  </div>
  <a href="/admin/login" class="back">Volver al inicio de sesión</a>
</div>

<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('errorText').textContent = 'Enlace inválido. Solicitá uno nuevo.';
    document.getElementById('errorMsg').classList.add('show');
    document.getElementById('resetForm').style.display = 'none';
  }

  function toggleVis(inputId, btn) {
    const input = document.getElementById(inputId);
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  async function handleReset(e) {
    e.preventDefault();
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.classList.remove('show');

    const p1 = document.getElementById('pass1').value;
    const p2 = document.getElementById('pass2').value;

    if (p1.length < 8) {
      document.getElementById('errorText').textContent = 'La contraseña debe tener al menos 8 caracteres.';
      errorMsg.classList.add('show'); return;
    }
    if (p1 !== p2) {
      document.getElementById('errorText').textContent = 'Las contraseñas no coinciden.';
      errorMsg.classList.add('show'); return;
    }

    const btn = document.getElementById('btnReset');
    btn.classList.add('loading');

    try {
      const res = await fetch('/auth/user/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: p1 }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        document.getElementById('successMsg').classList.add('show');
        document.getElementById('resetForm').style.display = 'none';
        setTimeout(() => window.location.href = '/admin/login', 2000);
      } else {
        document.getElementById('errorText').textContent = data.error || 'Error al actualizar la contraseña.';
        errorMsg.classList.add('show');
        btn.classList.remove('loading');
      }
    } catch (_) {
      document.getElementById('errorText').textContent = 'Error de conexión.';
      errorMsg.classList.add('show');
      btn.classList.remove('loading');
    }
  }
</script>
</body>
</html>
